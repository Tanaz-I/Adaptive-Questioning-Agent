<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Upload Simulation CSV</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f0f13;
      --surface: #1a1a24;
      --border:  #2e2e40;
      --accent:  #7c6ff7;
      --text:    #e8e8f0;
      --muted:   #8888aa;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 36px 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
      position: relative;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(124,111,247,0.05);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon { font-size: 2rem; margin-bottom: 10px; }
    .drop-text { font-size: 0.9rem; color: var(--muted); }
    .file-name {
      font-size: 0.82rem;
      color: var(--accent);
      margin-top: 8px;
      min-height: 18px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="card">
  <h1>Simulation Report</h1>
  <p class="sub">Upload the file to view the session report</p>

  <form method="POST" action="/upload" enctype="multipart/form-data" id="uploadForm">
    <div class="drop-zone" id="dropZone">
      <input type="file" name="csv_file" id="csvFile" accept=".csv" required>
      <div class="drop-icon">📂</div>
      <div class="drop-text">Click or drag &amp; drop your CSV here</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <button type="submit" id="submitBtn" disabled>Generate Report →</button>
  </form>
</div>

<script>
  const input     = document.getElementById('csvFile');
  const fileName  = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  const dropZone  = document.getElementById('dropZone');

  input.addEventListener('change', () => {
    if (input.files.length) {
      fileName.textContent = input.files[0].name;
      submitBtn.disabled = false;
    }
  });

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    input.files = e.dataTransfer.files;
    if (input.files.length) {
      fileName.textContent = input.files[0].name;
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
